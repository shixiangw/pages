name: Update filelist

# 每次 push 到 main 时，自动重新生成 filelist.json 并 commit 回 main 分支。
# Cloudflare Pages（跟踪 main）和 GitHub Pages 都能直接拿到最新清单。
#
# 鉴权：使用内置 GITHUB_TOKEN（workflow 授予 contents: write 权限即可 push）。
# 前提是 main 分支不再强制要求 PR（已改为可直接 push）。
# commit message 带 [skip ci]，避免触发自身无限递归。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-filelist
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate filelist.json
        run: node generate-filelist.js

      - name: Commit filelist.json back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add filelist.json
          if git diff --cached --quiet; then
            echo "filelist.json 无变化，跳过提交"
          else
            git commit -m "chore: 自动更新 filelist.json [skip ci]"
            git push
          fi
