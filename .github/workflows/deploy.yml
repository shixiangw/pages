name: Build & Deploy

# 纯静态站点：每次 push 到 main 时生成 filelist.json 并 commit 回 main。
# Cloudflare Pages 跟踪 main 分支自动部署，站点完全不调用 api.github.com。
#
# 鉴权：使用 GitHub App installation token（actions/create-github-app-token），
# 权限收敛、可撤销、短期有效。
# 需要仓库 Secrets：APP_ID、APP_PRIVATE_KEY（GitHub App 私钥 PEM）。
#
# 防循环：
#   1) generate-filelist.js 仅在文件树变化时才重写 filelist.json，
#      未变则不写文件 → git 无 diff → commit 步骤跳过。
#   2) commit message 含 [skip ci]，push 不会再次触发本 workflow。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── 1. 检出仓库 ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 生成 token ──
      - name: Generate GitHub App token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # ── 3. 设置 Node ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 4. 生成静态文件清单 ──
      - name: Generate filelist.json
        id: filelist
        run: node generate-filelist.js

      # ── 5. 校验 filelist.json ──
      - name: Validate filelist.json
        run: |
          if [ ! -f filelist.json ]; then
            echo "❌ filelist.json 未生成"
            exit 1
          fi

          # 验证 JSON 语法
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('filelist.json', 'utf8'));
            if (!data.tree || !Array.isArray(data.tree)) throw new Error('缺少 tree 数组');
            if (!data.generatedAt) throw new Error('缺少 generatedAt 字段');
            // 确认基础设施文件已被排除
            const infraFiles = data.tree.filter(f => ['viewer.html','index.html','filelist.json'].includes(f.path));
            if (infraFiles.length > 0) {
              console.error('❌ 基础设施文件不应出现在 tree 中:', infraFiles.map(f=>f.path).join(', '));
              process.exit(1);
            }
            const htmlCount = data.tree.filter(f => f.path.endsWith('.html')||f.path.endsWith('.htm')).length;
            const mdCount = data.tree.filter(f => f.path.endsWith('.md')||f.path.endsWith('.markdown')).length;
            console.log('✅ filelist.json 校验通过 (%d 个文件: %d HTML + %d MD)', data.tree.length, htmlCount, mdCount);
          " || exit 1

          # 验证 viewer.html 不再引用外部 GitHub 资源
          if grep -q 'raw.githubusercontent.com' viewer.html 2>/dev/null; then
            echo "❌ viewer.html 仍引用 raw.githubusercontent.com"
            exit 1
          fi
          echo "✅ viewer.html 无外部 GitHub 依赖"

      # ── 6. 确保 CNAME 存在 ──
      - name: Verify CNAME
        run: |
          if [ -f CNAME ]; then
            echo "✅ CNAME: $(cat CNAME)"
          else
            echo "⚠️ CNAME 文件不存在，Cloudflare Pages 自定义域名可能失效"
          fi

      # ── 7. 提交 filelist.json 回 main ──
      - name: Commit filelist.json
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/shixiangw/pages.git"

          git add filelist.json

          if git diff --cached --quiet; then
            echo "✅ filelist.json 无变化，跳过提交"
          else
            git commit -m "chore: 自动更新 filelist.json [skip ci]"
            git push origin HEAD:main
            echo "✅ filelist.json 已提交并推送到 main，Cloudflare Pages 将自动部署"
          fi

      # ── 8. 部署摘要 ──
      - name: Deployment summary
        run: |
          echo ""
          echo "═══════════════════════════════════════"
          echo "  部署完成"
          echo "═══════════════════════════════════════"
          echo "  站点: https://pages.daowsx.workers.dev"
          echo "  清单: $(node -e "const d=require('./filelist.json');console.log(d.tree.length+' 文件')")"
          echo "  架构: 纯静态（无 api.github.com 调用）"
          echo "═══════════════════════════════════════"
