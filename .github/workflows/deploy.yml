name: Validate

# 纯静态站点：每次 push 到 main 时校验文件清单生成和页面静态化程度。
# 真正的构建/部署由 Cloudflare Pages 完成（跟踪 main 分支，构建命令 node generate-filelist.js）。
# 站点运行时完全不调用 api.github.com / raw.githubusercontent.com。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate filelist.json
        run: node generate-filelist.js

      - name: Validate generated output
        run: |
          set -e

          # --- 文件存在性 ---
          if [ ! -f filelist.json ]; then
            echo "::error::filelist.json 未生成"
            exit 1
          fi

          # --- JSON 合法性 + 内容校验 ---
          node <<'NODESCRIPT'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('filelist.json', 'utf8'));

          let ok = true;
          if (!data.tree || !Array.isArray(data.tree)) {
            console.error('::error::filelist.json 缺少 tree 数组');
            ok = false;
          }
          if (!data.generatedAt) {
            console.error('::error::filelist.json 缺少 generatedAt 字段');
            ok = false;
          }

          // 基础设施文件不应出现在目录树中
          const EXCLUDE = ['viewer.html', 'index.html', 'filelist.json'];
          const leaked = data.tree.filter(f => EXCLUDE.includes(f.path));
          if (leaked.length > 0) {
            console.error('::error::基础设施文件出现在 tree 中: ' + leaked.map(f => f.path).join(', '));
            ok = false;
          }

          // 计算统计
          const html = data.tree.filter(f => f.path.endsWith('.html') || f.path.endsWith('.htm')).length;
          const md   = data.tree.filter(f => f.path.endsWith('.md') || f.path.endsWith('.markdown')).length;
          console.log('filelist.json: ' + data.tree.length + ' 个文件 (' + html + ' HTML, ' + md + ' MD)');

          if (!ok) process.exit(1);
          NODESCRIPT

          # --- viewer.html 无外部 GitHub 依赖 ---
          if grep -qF 'raw.githubusercontent.com' viewer.html 2>/dev/null; then
            echo "::error::viewer.html 引用 raw.githubusercontent.com"
            exit 1
          fi
          if grep -qF 'api.github.com' viewer.html 2>/dev/null; then
            echo "::error::viewer.html 引用 api.github.com"
            exit 1
          fi
          echo "✅ viewer.html 零外部 GitHub API 依赖"

      - name: Verify CNAME
        run: |
          if [ -f CNAME ]; then
            echo "CNAME: $(cat CNAME)"
          else
            echo "::warning::CNAME 文件缺失，Cloudflare Pages 自定义域名可能失效"
          fi

      - name: Check filelist.json is tracked
        run: |
          if git ls-files --error-unmatch filelist.json >/dev/null 2>&1; then
            echo "✅ filelist.json 已被 Git 跟踪（Cloudflare Pages 构建时会重新生成）"
          else
            echo "::warning::filelist.json 未被 Git 跟踪"
          fi

      - name: Summary
        run: |
          echo ""
          echo "═══════════════════════════════════════"
          echo "  校验通过"
          echo "═══════════════════════════════════════"
          echo "  站点 : https://pages.daowsx.workers.dev"
          echo "  构建 : Cloudflare Pages (跟踪 main)"
          echo "  清单 : node generate-filelist.js"
          echo "  架构 : 纯静态 · 零 GitHub API 调用"
          echo "═══════════════════════════════════════"
