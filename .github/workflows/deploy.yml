name: Update filelist

# 每次 push 到 main 时，自动重新生成 filelist.json 并 commit 回 main 分支。
# Cloudflare Pages（跟踪 main）和 GitHub Pages（source 设为 main）都能直接拿到最新清单，
# 不再依赖 gh-pages 分支，避免 force_orphan 导致 webhook 漏触发的问题。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-filelist
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate filelist.json
        run: node generate-filelist.js

      - name: Commit filelist.json back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add filelist.json
          if git diff --cached --quiet; then
            echo "filelist.json 无变化，跳过提交"
          else
            git commit -m "chore: 自动更新 filelist.json [skip ci]"
            git push
          fi
