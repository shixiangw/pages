const MD_SOURCE = `# Fleets 私有化部署方案 — 资源估算与场景评估

> **版本**: v1.1 | **更新日期**: 2026-06-30 | **基点版本**: EMQX Enterprise 5.10.3 + Fleets (Go)
> **修正**: v1.1 大幅下调 Fleets 资源（实际仅处理 API CRUD + 认证回调，主数据流经规则引擎直接入 DB），细化 LB 资源（区分 L4 透传 vs L7 TLS 卸载）

---

## 1. 系统架构总览

### 1.1 数据流澄清（关键）

\`\`\`
设备数据上报（如影子上报、遥测）
    │
    ├─ MQTT → EMQX ──→ GreptimeDB (规则桥接 gRPC, 主路径, 不经过 Fleets)
    │                └─→ Fleets ThingDatas API (规则 HTTP POST, 仅 lifecycle/shadow PG 副本/command response)
    │                                               └─→ PostgreSQL (少量写入)
    │
    └─ HTTPS → Fleets ThingDatas API ──→ GreptimeDB (时序)
                                         └─→ PostgreSQL (非时序)

Fleets 实际承载的流量：
  - 管理 API (设备 CRUD、影子查询、作业/命令管理) — 低 QPS
  - Broker 认证回调 (设备连接/断开时验证) — 极低 QPS
  - 规则引擎 HTTP POST 回调 — 中等 QPS (不包含主时序数据)
  - EMQX API 下行发布 (指令/影子/通知) — 低 QPS
\`\`\`

**核心结论**: 时序数据（占比 80%+ 的 TPS）流经 \`EMQX → GreptimeDB\`，不经过 Fleets。Fleets 处理的是剩余的非时序管理面和部分非时序设备面流量，负载远低于原始 TPS。

### 1.2 依赖组件清单

| # | 组件 | 角色 | 数据流 | 关键端口 |
|---|------|------|--------|----------|
| 1 | **EMQX Enterprise** | MQTT Broker — 设备连接、消息路由、规则引擎、认证鉴权 | 设备 ←MQTT/TLS→ EMQX → **GreptimeDB** (规则桥接写入 TS)、EMQX → **Fleets** (规则 HTTP POST 写入 PG) | 1883(MQTT), 8883(MQTTS), 8084(WSS), 18083(API/Dashboard) |
| 2 | **Fleets (Go)** | 业务后端 — 设备注册、影子、作业、命令、认证、管理 API | 设备 ←HTTPS→ Fleets → **PostgreSQL** (元数据)、Fleets → **GreptimeDB** (查询 TS)、Fleets → **EMQX API** (下行发布) | 8080(HTTP), 8443(HTTPS) |
| 3 | **PostgreSQL 16** | 元数据存储 — 设备注册表、影子状态、作业、命令、API 密钥、设备凭证 | 连接数: Fleets 实例数 × 连接池 | 5432 |
| 4 | **GreptimeDB (EMQX Tables)** | 时序数据库 — 事件历史、影子上报历史、可选遥测数据 | EMQX 规则桥接 (gRPC 4001) 写入，Fleets 查询 (PG wire 4003) | 4000(HTTP), 4001(gRPC), 4003(PG wire) |
| 5 | **负载均衡器** | TLS 卸载（可选）、流量分发 | 外部 → LB → EMQX / Fleets | 443(TLS), 8883(MQTTS) |
| 6 | **监控告警** | Prometheus + Grafana / ELK | 各组件暴露 metrics 端点 | — |

### 1.3 网络拓扑

\`\`\`
                  ┌───────────── LB 层 ───────────────┐
                  │  MQTT: L4 TCP 透传 (haproxy/云 NLB)   │
                  │  HTTP: L7 TLS 卸载 (haproxy/云 ALB)   │
                  │  或 云 LB (NLB for MQTT + ALB for API) │
                  └──────────────────┬──────────────────┘
                                     │
           ┌─────────────────────────┼─────────────────────────┐
           │  MQTT(L4)               │  HTTP(L7)               │
     ┌─────▼─────────┐      ┌───────▼─────────┐      ┌───────▼──────────┐
     │  EMQX Cluster  │      │  Fleets (Go)   │      │  Admin / Ops     │
     │  (N nodes)     │      │  2-3 replicas  │      │  Dashboard       │
     │  (MQTTS/TLS)   │      └───────┬─────────┘      └──────────────────┘
     └─────┬──────────┘              │
           │                         │
     ┌─────┴──────────┐   ┌─────────┴─────────┐
     │  GreptimeDB    │   │  PostgreSQL 16    │
     │  (时序, gRPC)  │   │  (元数据, pgx)    │
     └────────────────┘   └───────────────────┘

数据流说明:
  MQTT 上行:  设备 ─MQTTS→ LB(L4透传) ───→ EMQX ──gRPC──→ GreptimeDB (主)
                                                ─HTTP──→ Fleets → PG (辅: lifecycle/shadow副本)
  HTTPS 上行: 设备 ─HTTPS→ LB(L7卸载) ──→ Fleets ──→ GreptimeDB / PG
  下行:       Fleets ─EMQX API→ EMQX ─MQTT→ 设备
\`\`\`

## 2. 三个部署规模下的资源估算

### 2.1 估算假设

| 参数 | 假设值 | 说明 |
|------|--------|------|
| 消息 QoS | QoS 1 | 默认生产级可靠性 |
| 消息 Payload | 256 字节 | 影子上报 + 事件，含 JSON 开销 |
| 每连接空闲内存 (TCP) | ~250 KB | EMQX 长连接基础开销 |
| 每连接空闲内存 (TLS) | ~500 KB | TLS 握手 + 会话缓存额外 200-300 KB |
| 每连接空闲内存 (mTLS) | ~600 KB | 双向认证额外开销 |
| 设备数据上报频率 | 每 5 分钟 1 次影子上报 | 典型 IoT 场景 |
| 事件产生频率 | 每设备每天 10 条事件 | 连接/断开/告警等 |
| 数据传输比 | 上行:下行 = 8:2 | 以数据上报为主，指令为辅 |
| 数据保留周期 | 90 天 | GreptimeDB 时序数据保留 |
| **Fleets 实际承载 TPS** | 仅总量的 **10-20%** | 主时序流经 EMQX→GreptimeDB，不经过 Fleets |
| Fleets 高可用副本 | 2-3 副本 | 轻量 Go 服务，2 副本足够，3 副本冗余 |
| PostgreSQL 连接池 | 每个 Fleets 实例 20-40 连接 | pgx 默认连接池大小 |
| LB 工作模式 | **MQTT→L4 TCP 透传** / **API→L7 TLS 卸载** | 见下文详细说明 |

#### Fleets 负载校正（关键）

Fleets **不承载**规则引擎写入 GreptimeDB 的时序数据路径，仅处理：

| Fleets 职责 | 10 万设备 QPS | 50 万设备 QPS | 100 万设备 QPS | 说明 |
|------------|:-------------:|:-------------:|:--------------:|------|
| 管理 API (CRUD) | < 5 | < 20 | < 50 | 管理员操作，非持续流量 |
| Broker 认证回调 | ~0.3 | ~1.7 | ~3.3 | 仅设备重连时触发 |
| 规则 HTTP POST (shadow PG 副本) | ~333 | ~1,667 | ~3,333 | 5min/次上报 |
| 规则 HTTP POST (lifecycle/command) | ~3 | ~17 | ~33 | 事件 + 指令响应 |
| EMQX API 下行发布 | ~55 (10万设备/30min) | ~278 | ~556 | 指令/影子/通知 |
| **Fleets 总处理 QPS** | **~400** | **~2,000** | **~4,000** | Go 轻松应对 |

> Go HTTP 服务器单核可处理 **5,000+ QPS**（简单 JSON CRUD），Fleets 负载在三个规模下均极低。

### 2.2 规模一：10 万连接 / 1 万 TPS（入门级）

#### 总吞吐量分析

- 10,000 msg/s（双向总吞吐）
- 上行 ~8,000 msg/s，下行 ~2,000 msg/s
- 每天消息量: 10,000 × 86,400 = **~8.64 亿条/天**
- 每天数据写入量（时序）: ~215 GB/day（原始）

#### 资源分配表

| 组件 | 节点数 | 单节点规格 | 合计 CPU | 合计内存 | 存储说明 | 网络带宽 |
|------|--------|-----------|:--------:|:--------:|---------|:--------:|
| **EMQX Enterprise** | 2 | 8 vCPU / 16 GB | 16 vCPU | 32 GB | 日志 200 GB SSD | 2 Gbps |

### 3.3 详细场景分析

#### 3.3.1 TLS 双向认证（mTLS）

**架构支持**: Fleets 已有完整的 mTLS 支持链：

1. EMQX 监听器配置 MQTTS 8883 端口 + \`two_way\` TLS 模式
2. Fleets 提供 \`/api/v1/settings/emqx/listeners/mqtts/certificates\` API 自动生成/配置证书
3. 设备登录时 EMQX 将客户端证书 CN 传给 Fleets broker-auth 回调验证
4. \`mqttDeviceAuthMode: "mtls"\` 模式下，仅 mTLS 设备被允许连接

**大规模注意事项**:

| 关注点 | 影响分析 |
|--------|---------|
| 证书管理 | 100 万设备 × 唯一证书，Fleets 使用 \`thing_certs\` 表管理，需做好 CA 层级 |
| TLS 握手开销 | 每连接 ~600 KB 内存，10 万连接约 **60 GB** |
| 证书撤销 | OCSP/CRL 机制需额外配置 |
| 证书轮换 | 建议设备证书 1 年有效期自动轮换 |

#### 3.3.2 数据上报与存储

**写入模型分析** (假设每台设备每 5 分钟上报一次)：

| 50万 | ~1,667 | 1,667 | ~1,800 | ~430 GB |
| 100万 | ~3,333 | 3,333 | ~3,600 | ~1.08 TB |

## 6. 总结评估

### 6.1 场景支持结论

| 需求 | 是否支持 | 评估等级 |
|------|---------|---------|
| TLS 单向认证 | ✅ 原生支持，开箱即用 | **支持** |
| TLS 双向认证 (mTLS) | ✅ 原生支持，API 自动配置证书 | **支持** |
| 设备注册（三元组/凭证） | ✅ 完备的管理 API + 存储 | **支持** |
| 设备状态监控（在线/离线） | ✅ 基于 lifecycle 事件，实时准确 | **支持** |
| 数据上报（影子 + 遥测） | ✅ Shadow + 自定义 topic 双通道 | **支持** |
| 数据存储（PG + 时序） | ✅ PG 元数据 + GreptimeDB 时序 | **支持** |
| 指令下发（影子/命令/作业） | ✅ EMQX V5 API 发布，无竞争 | **支持** |

### 6.2 总资源汇总（场景 A - TCP 透传，推荐）

| 规模 | 总物理节点 | 总 vCPU | 总 RAM | 网络带宽 |
|:-----|:---------:|:-------:|:------:|:--------:|
| **10 万 / 1 万 TPS** | 10 台 | **62 vCPU** | **188 GB** | 2-4 Gbps |
| **50 万 / 2 万 TPS** | 15 台 | **196 vCPU** | **584 GB** | 4-8 Gbps |
| **100 万 / 5 万 TPS** | 18 台 | **464 vCPU** | **1,568 GB** | 8 Gbps+ |

### 6.3 建议

1. **Fleets 资源无需高配** — Go 轻量服务，2-4 vCPU / 4-8 GB × 2-3 副本即可覆盖所有规模
2. **LB 选型：先定 TLS 卸载位置，再看部署方式** — 自建场景优先 TCP 透传，公有云用 NLB+ALB/ACM
3. **时序数据使用对象存储** — GreptimeDB 冷数据建议 S3/MinIO，节省 70%+ 存储成本
4. **使用 Fleets API 进行 EMQX 配置** — 生产环境使用 \`POST /api/v1/settings/emqx/setup\`
5. **100 万规模部署前通过压测验证** — EMQX 官方建议实际压测校准资源配置
6. **大连接数下严格调优内核参数** — 文件描述符、TCP 缓冲区等必须按官方文档调整
7. **PostgreSQL 配置** — 连接池、max_connections、shared_buffers 按规模调优；建议 PgBouncer

document.addEventListener('DOMContentLoaded', () => {
  const content = document.getElementById('content');
  content.innerHTML = marked.parse(MD_SOURCE);

  // ─── Highlight code blocks ───
  document.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });

  // ─── Build TOC ───
  const tocList = document.getElementById('tocList');
  const headings = content.querySelectorAll('h1, h2, h3, h4');
  headings.forEach((h, i) => {
    const id = 'heading-' + i;
    h.id = id;
    const li = document.createElement('li');
    li.className = 'toc-item ' + h.tagName.toLowerCase();
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent;
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // close sidebar on mobile
      if (window.innerWidth <= 900) toggleSidebar(false);
    });
    li.appendChild(a);
    tocList.appendChild(li);
  });

  // ─── Active TOC on scroll ───
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        document.querySelectorAll('.toc-item').forEach(item => {
          item.classList.toggle('active', item.querySelector('a')?.getAttribute('href') === '#' + id);
        });
      }
    });
  }, { rootMargin: '-60px 0px -70% 0px' });

  headings.forEach(h => observer.observe(h));

  // ─── Back to top ───
  const btn = document.getElementById('backToTop');
  window.addEventListener('scroll', () => {
    btn.style.display = window.scrollY > 400 ? 'flex' : 'none';
  });
  btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  // ─── Mobile menu ───
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  function toggleSidebar(open) {
    sidebar.classList.toggle('open', open);
    overlay.classList.toggle('open', open);
  }

  menuToggle.addEventListener('click', () => toggleSidebar(!sidebar.classList.contains('open')));
  overlay.addEventListener('click', () => toggleSidebar(false));
});
</script>
