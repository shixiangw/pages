<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Device Agent · 架构手绘图</title>
<style>
  :root{
    --font-hand: "Comic Sans MS","Segoe Print","Bradley Hand","PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
  }
  *{box-sizing:border-box}
  body{ margin:0; font-family:var(--font-hand); color:#111827; background:#fbfbfa; }
  header{ padding:18px 24px 4px; }
  header h1{ margin:0; font-size:22px; font-weight:700; letter-spacing:.3px; }
  header p{ margin:4px 0 0; font-size:13px; color:#667085; }

  .legend-bar{
    display:flex; flex-wrap:wrap; align-items:center; gap:10px 18px;
    margin:10px 24px 0; padding:10px 14px;
    background:#fff; border:1px solid #E5E7EB; border-radius:12px;
    font-size:12.5px; box-shadow:0 1px 2px rgba(16,24,40,.05);
  }
  .legend-bar .lb-title{ font-weight:700; color:#334155; margin-right:2px; }
  .legend-item{ display:flex; align-items:center; gap:7px; cursor:default; padding:2px 4px; border-radius:6px; }
  .legend-item:hover{ background:#F1F5F9; }
  .legend-item .sw{ width:15px; height:15px; border-radius:4px; border:1.6px solid #334155; flex:none; }
  .legend-bar .hint{ margin-left:auto; color:#667085; font-size:12px; }

  .stage{
    margin:12px 24px 26px;
    border:1px solid #E5E7EB; border-radius:14px;
    background:#fff; overflow:auto;
    box-shadow:0 1px 3px rgba(16,24,40,.06);
  }
  svg{ display:block; width:100%; height:auto; background:#fff; }

  .band{ fill:#FCFDFF; stroke:#EEF1F4; stroke-width:1.2; }
  .band-label{ fill:#98A2B3; font-size:12.5px; font-weight:700; letter-spacing:.6px; }

  .edge-line{ fill:none; stroke:#475467; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  .edge.dep .edge-line{ stroke:#B0B7C3; stroke-width:1.2; stroke-dasharray:5 4; }
  .edge-label{
    font-family:var(--font-hand); font-size:11px; fill:#475467;
    paint-order:stroke; stroke:#ffffff; stroke-width:3.4px; stroke-linejoin:round;
  }
  .node{ cursor:pointer; }
  .node text{ font-family:var(--font-hand); text-anchor:middle; }
  .node .n-main{ fill:#111827; font-weight:700; font-size:13.5px; }
  .node .n-sub{ fill:#475467; font-size:10.5px; }

  .foundation-note{ fill:#64748B; font-size:11.5px; font-style:italic; }

  #diagram.focus .node.dim, #diagram.focus .edge.dim{ opacity:.1; }
  #diagram.focus .node.lit, #diagram.focus .edge.lit{ opacity:1; }
  .node,.edge{ transition:opacity .12s ease; }
</style>
</head>
<body>
  <header>
    <h1>EMQX Device Agent · 系统架构手绘图</h1>
    <p>从左到右的数据流：客户端 → 接入 → 网关运行时 → 能力服务 · 悬停任一服务高亮其全部连接（点击可固定）</p>
  </header>

  <div class="legend-bar">
    <span class="lb-title">层级图例</span>
    <div class="legend-item" data-layer="client"><span class="sw" style="background:#ECFDF3;border-color:#027A48"></span>客户端 / Edge</div>
    <div class="legend-item" data-layer="gateway"><span class="sw" style="background:#EFF8FF;border-color:#175CD3"></span>网关运行时 / 服务</div>
    <div class="legend-item" data-layer="ai"><span class="sw" style="background:#F5F3FF;border-color:#7A5AF8"></span>AI / 推理</div>
    <div class="legend-item" data-layer="data"><span class="sw" style="background:#F0F9FF;border-color:#026AA2"></span>数据 / 存储</div>
    <div class="legend-item" data-layer="external"><span class="sw" style="background:#F4F3FF;border-color:#6941C6"></span>外部系统</div>
    <div class="legend-item" data-layer="shared"><span class="sw" style="background:#F8FAFC;border-color:#334155"></span>共享库 / 契约</div>
    <span class="hint">悬停 / 点击服务节点查看连接</span>
  </div>

  <div class="stage">
    <svg id="diagram" viewBox="0 0 1300 800" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Device Agent 架构图">
      <defs>
        <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
          <path d="M 26 0 L 0 0 0 26" fill="none" stroke="#EEF1F4" stroke-width="1"/>
        </pattern>
        <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
          <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="11" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="160%">
          <feDropShadow dx="0" dy="2.5" stdDeviation="2.4" flood-color="#101828" flood-opacity="0.16"/>
        </filter>
      </defs>

      <rect x="0" y="0" width="1300" height="800" fill="#FFFFFF"/>
      <rect x="0" y="0" width="1300" height="800" fill="url(#grid)"/>

      <!-- lane bands -->
      <g>
        <rect class="band" x="15"   y="52" width="205" height="455" rx="12"/>
        <text class="band-label" x="117" y="72" text-anchor="middle">客户端 / Edge</text>

        <rect class="band" x="250"  y="52" width="230" height="425" rx="12"/>
        <text class="band-label" x="365" y="72" text-anchor="middle">接入层</text>

        <rect class="band" x="520"  y="52" width="475" height="505" rx="12"/>
        <text class="band-label" x="757" y="72" text-anchor="middle">agent-gateway 运行时</text>

        <rect class="band" x="1030" y="52" width="240" height="500" rx="12"/>
        <text class="band-label" x="1150" y="72" text-anchor="middle">能力服务 · AI / 数据</text>
      </g>

      <g filter="url(#rough)" id="content">
        <g id="edges"></g>
        <g id="nodes"></g>
      </g>

      <g id="edge-labels"></g>

      <text class="foundation-note" x="757" y="760" text-anchor="middle">packages/shared 作为基础契约层，被上方所有服务隐式依赖（配置 / 类型 / 主题）</text>
    </svg>
  </div>

<script>
"use strict";

const LAYERS = {
  client:   {fill:"#ECFDF3", stroke:"#027A48"},
  gateway:  {fill:"#EFF8FF", stroke:"#175CD3"},
  ai:       {fill:"#F5F3FF", stroke:"#7A5AF8"},
  data:     {fill:"#F0F9FF", stroke:"#026AA2"},
  external: {fill:"#F4F3FF", stroke:"#6941C6"},
  shared:   {fill:"#F8FAFC", stroke:"#334155"},
};

const NODES = [
  // ---- Band A: clients ----
  {id:"web",       layer:"client", label:"Web 控制台\napps/web",             x:30, y:90,  w:175, h:56},
  {id:"tui",       layer:"client", label:"TUI 客户端\napps/tui",            x:30, y:200, w:175, h:56},
  {id:"devicesdk", layer:"client", label:"设备 SDK\npackages/device-sdk",   x:30, y:310, w:175, h:56},
  {id:"miniapp",   layer:"client", label:"MiniApp 示例\napps/miniapp-demo", x:30, y:430, w:175, h:56},

  // ---- Band B: access plane ----
  {id:"emqx", layer:"external", label:"EMQX MQTT Broker\n命令 / 遥测 / 影子", x:265, y:215, w:200, h:70},
  {id:"dac",  layer:"gateway",  label:"Device Access Control\napps/device-access-control", x:265, y:400, w:200, h:66},

  // ---- Band C: gateway runtime ----
  // ingress lane (channels at bottom, adjacent to the IM platforms it drives)
  {id:"httpapi",       layer:"gateway", label:"HTTP API\n/api/*",           x:545, y:90,  w:175, h:56},
  {id:"timer",         layer:"gateway", label:"Timer Runner\n定时任务",      x:545, y:205, w:175, h:56},
  {id:"mqtttransport", layer:"gateway", label:"MQTT Transport\nEMQX 连接",   x:545, y:320, w:175, h:56},
  {id:"channels",      layer:"gateway", label:"Channels\nIM / Voice / A2A", x:545, y:435, w:175, h:56},
  // core lane
  {id:"bus",           layer:"gateway", label:"MessageBus\n内部事件总线",    x:800, y:130, w:175, h:56},
  {id:"agentrouter",   layer:"gateway", label:"Agent Router\n会话编排 / PI", x:800, y:300, w:175, h:56},
  {id:"tools",         layer:"gateway", label:"Tools\n设备 / 工作流 / 技能", x:800, y:475, w:175, h:56},

  // ---- Band D: capability services ----
  {id:"llm",     layer:"ai",   label:"LLM / PI Provider\n会话模型", x:1055, y:90,  w:190, h:58},
  {id:"vision",  layer:"ai",   label:"Vision Provider\n图像分析",   x:1055, y:205, w:190, h:58},
  {id:"voice",   layer:"ai",   label:"Voice ASR/TTS\n语音",         x:1055, y:320, w:190, h:58},
  {id:"devmgmt", layer:"data", label:"Device Management\nDrizzle + SQLite", x:1055, y:460, w:190, h:58},

  // ---- bottom externals (wechat under dac, im under channels) ----
  {id:"wechat", layer:"external", label:"微信平台\nwx.login / 小程序",         x:265, y:585, w:200, h:60},
  {id:"im",     layer:"external", label:"第三方 IM\nTelegram / Slack / 飞书…", x:545, y:585, w:200, h:60},

  // ---- foundation bar ----
  {id:"shared", layer:"shared", label:"packages/shared · 契约 / 配置 / 主题", x:265, y:700, w:980, h:44},
];

// curve = perpendicular bow of the connector; loff = perpendicular label offset
const EDGES = [
  {from:"web", to:"emqx", label:"MQTT/WS · 设备模拟器", curve:0, loff:0},
  {from:"tui", to:"emqx", label:"MQTT", curve:0, loff:0},
  {from:"devicesdk", to:"emqx", label:"命令 / 遥测", curve:0, loff:0},
  {from:"web", to:"httpapi", label:"REST /api/*", curve:0, loff:0},
  {from:"miniapp", to:"dac", label:"wx.request 设备/绑定", curve:0, loff:0},
  {from:"dac", to:"httpapi", label:"代理 /api* + 租户", curve:0, loff:25},
  {from:"httpapi", to:"bus", label:"publish", curve:0, loff:0},
  {from:"channels", to:"bus", label:"inbound", curve:40, loff:0},
  {from:"timer", to:"bus", label:"publishInbound", curve:0, loff:0},
  {from:"bus", to:"agentrouter", label:"dispatch", curve:0, loff:0},
  {from:"agentrouter", to:"tools", label:"invoke", curve:0, loff:0},
  {from:"agentrouter", to:"mqtttransport", label:"命令 / 订阅", curve:0, loff:0},
  {from:"mqtttransport", to:"emqx", label:"pub / sub", curve:0, loff:0},
  {from:"dac", to:"emqx", label:"MQTT 订阅", curve:0, loff:30},
  {from:"agentrouter", to:"llm", label:"会话", curve:0, loff:0},
  {from:"agentrouter", to:"vision", label:"视觉", curve:0, loff:0},
  {from:"channels", to:"voice", label:"ASR / TTS", curve:-120, loff:34},
  {from:"agentrouter", to:"devmgmt", label:"DB 读写", curve:0, loff:0},
  {from:"dac", to:"im", label:"事件代理", curve:0, loff:0},
  {from:"dac", to:"wechat", label:"wx-login 校验", curve:0, loff:0},
  {from:"channels", to:"im", label:"平台 API", curve:0, loff:0},
];

/* ---------- hand-drawn primitives ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let _rng = mulberry32(20240721);
function rnd(m){return (_rng()*2-1)*m;}

function roughRoundRect(x,y,w,h,r){
  r=Math.min(r,w/2,h/2,18);
  const J=()=>rnd(2.0);
  const pts=[
    [x+r,y+J()],[x+w-r,y+J()],[x+w+J(),y+r],[x+w+J(),y+h-r],
    [x+w-r,y+h+J()],[x+r,y+h+J()],[x+J(),y+h-r],[x+J(),y+r],
  ];
  const n=pts.length;
  let d="M "+pts[0][0].toFixed(1)+" "+pts[0][1].toFixed(1);
  for(let i=0;i<n;i++){
    const c=pts[i], nxt=pts[(i+1)%n];
    const mx=(c[0]+nxt[0])/2, my=(c[1]+nxt[1])/2;
    d+=" Q "+c[0].toFixed(1)+" "+c[1].toFixed(1)+" "+mx.toFixed(1)+" "+my.toFixed(1);
  }
  return d+" Z";
}

function roughLinePath(x1,y1,x2,y2,bow){
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy)||1;
  const nx=-dy/len, ny=dx/len;
  const off=(bow!==undefined)?bow:rnd(6);
  const cx=mx+nx*off, cy=my+ny*off;
  return `M ${x1.toFixed(1)} ${y1.toFixed(1)} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${x2.toFixed(1)} ${y2.toFixed(1)}`;
}

function arrowHead(x,y,ang,size){
  const a1=ang+Math.PI-0.42, a2=ang-Math.PI+0.42;
  const x1=x+Math.cos(a1)*size, y1=y+Math.sin(a1)*size;
  const x2=x+Math.cos(a2)*size, y2=y+Math.sin(a2)*size;
  return roughLinePath(x,y,x1,y1)+" "+roughLinePath(x,y,x2,y2);
}

function anchor(n, tx, ty){
  const cx=n.x+n.w/2, cy=n.y+n.h/2;
  let dx=tx-cx, dy=ty-cy;
  if(dx===0&&dy===0) return [cx,cy];
  const hw=n.w/2+2, hh=n.h/2+2;
  const sx = dx!==0 ? hw/Math.abs(dx) : Infinity;
  const sy = dy!==0 ? hh/Math.abs(dy) : Infinity;
  const s=Math.min(sx,sy);
  return [cx+dx*s, cy+dy*s];
}

/* tangent-direction of the quadratic at end point, for arrow angle */
function endAngle(ax,ay,cx,cy,bx,by){
  const dx=bx-cx, dy=by-cy; // derivative at t=1 proportional to (P2-P1)
  return Math.atan2(dy,dx);
}

/* ---------- render ---------- */
const byId = {};
NODES.forEach(n=>byId[n.id]=n);

const edgesG = document.getElementById("edges");
const nodesG = document.getElementById("nodes");
const labelsG = document.getElementById("edge-labels");

EDGES.forEach((e,i)=>{
  const a=byId[e.from], b=byId[e.to];
  const [ax,ay]=anchor(a, b.x+b.w/2, b.y+b.h/2);
  const [bx,by]=anchor(b, a.x+a.w/2, a.y+a.h/2);
  const mx=(ax+bx)/2, my=(ay+by)/2;
  const dx=bx-ax, dy=by-ay, len=Math.hypot(dx,dy)||1;
  const nx=-dy/len, ny=dx/len;
  const off=(e.curve!==undefined)?e.curve:0;
  const cx=mx+nx*off, cy=my+ny*off;
  const ang=endAngle(ax,ay,cx,cy,bx,by);

  const line=roughLinePath(ax,ay,bx,by,off);
  const head=arrowHead(bx,by,ang,11);
  const cls = e.kind==="dep" ? "edge dep" : "edge";
  const g=document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class",cls);
  g.setAttribute("id","edge-"+i);
  g.setAttribute("data-from",e.from);
  g.setAttribute("data-to",e.to);
  g.innerHTML=`<path class="edge-line" d="${line}"></path><path class="edge-line" d="${head}"></path>`;
  edgesG.appendChild(g);

  if(e.label){
    const loff=e.loff||0;
    // label sits on the curve midpoint (t=0.5 of quad = avg of ends and control)
    const lx=0.25*ax+0.5*cx+0.25*bx + nx*loff;
    const ly=0.25*ay+0.5*cy+0.25*by + ny*loff;
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("class","edge-label");
    t.setAttribute("x",lx.toFixed(1));
    t.setAttribute("y",ly.toFixed(1));
    t.setAttribute("text-anchor","middle");
    t.textContent=e.label;
    labelsG.appendChild(t);
  }
});

NODES.forEach(n=>{
  const L=LAYERS[n.layer];
  const g=document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class","node");
  g.setAttribute("id","node-"+n.id);
  g.setAttribute("data-layer",n.layer);
  let s=`<g filter="url(#cardshadow)">`;
  s+=`<path d="${roughRoundRect(n.x,n.y,n.w,n.h,14)}" fill="${L.fill}" stroke="${L.stroke}" stroke-width="2" stroke-linejoin="round"></path>`;
  s+=`<path d="${roughRoundRect(n.x,n.y,n.w,n.h,14)}" fill="none" stroke="${L.stroke}" stroke-width="1" stroke-linejoin="round" opacity="0.22"></path>`;
  s+=`</g>`;
  const cx=n.x+n.w/2, cy=n.y+n.h/2;
  const parts=n.label.split("\n");
  if(parts.length===1){
    s+=`<text class="n-main" x="${cx}" y="${cy+4}" dominant-baseline="middle">${parts[0]}</text>`;
  }else{
    s+=`<text class="n-main" x="${cx}" y="${cy-7}">${parts[0]}</text>`;
    s+=`<text class="n-sub" x="${cx}" y="${cy+11}">${parts[1]}</text>`;
  }
  g.innerHTML=s;
  nodesG.appendChild(g);
});

/* ---------- interaction ---------- */
const svg=document.getElementById("diagram");
const adj={};
NODES.forEach(n=>adj[n.id]=new Set());
EDGES.forEach(e=>{adj[e.from].add(e.to);adj[e.to].add(e.from);});
const layerOf={};
NODES.forEach(n=>layerOf[n.id]=n.layer);

let pinned=null;

function focusNode(id){
  svg.classList.add("focus");
  NODES.forEach(n=>{
    const g=document.getElementById("node-"+n.id);
    if(n.id===id || adj[id].has(n.id)){g.classList.add("lit");g.classList.remove("dim");}
    else{g.classList.add("dim");g.classList.remove("lit");}
  });
  EDGES.forEach((e,i)=>{
    const el=document.getElementById("edge-"+i);
    if(e.from===id||e.to===id){el.classList.add("lit");el.classList.remove("dim");}
    else{el.classList.add("dim");el.classList.remove("lit");}
  });
}
function focusLayer(layer){
  svg.classList.add("focus");
  NODES.forEach(n=>{
    const g=document.getElementById("node-"+n.id);
    if(n.layer===layer){g.classList.add("lit");g.classList.remove("dim");}
    else{g.classList.add("dim");g.classList.remove("lit");}
  });
  EDGES.forEach((e,i)=>{
    const el=document.getElementById("edge-"+i);
    if(layerOf[e.from]===layer||layerOf[e.to]===layer){el.classList.add("lit");el.classList.remove("dim");}
    else{el.classList.add("dim");el.classList.remove("lit");}
  });
}
function clearFocus(){
  svg.classList.remove("focus");
  document.querySelectorAll(".dim,.lit").forEach(el=>el.classList.remove("dim","lit"));
}

NODES.forEach(n=>{
  const g=document.getElementById("node-"+n.id);
  g.addEventListener("mouseenter",()=>{ if(!pinned) focusNode(n.id); });
  g.addEventListener("mouseleave",()=>{ if(!pinned) clearFocus(); });
  g.addEventListener("click",(ev)=>{
    ev.stopPropagation();
    if(pinned===n.id){pinned=null;clearFocus();}
    else{pinned=n.id;focusNode(n.id);}
  });
});

document.querySelectorAll(".legend-item").forEach(item=>{
  const layer=item.getAttribute("data-layer");
  item.addEventListener("mouseenter",()=>{ if(!pinned) focusLayer(layer); });
  item.addEventListener("mouseleave",()=>{ if(!pinned) clearFocus(); });
  item.addEventListener("click",(ev)=>{
    ev.stopPropagation();
    if(pinned==="layer:"+layer){pinned=null;clearFocus();}
    else{pinned="layer:"+layer;focusLayer(layer);}
  });
});

svg.addEventListener("click",()=>{pinned=null;clearFocus();});
</script>
</body>
</html>
